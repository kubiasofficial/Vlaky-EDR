<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SimRail Dispečer 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="home-screen">
        <div class="overlay">
            <div class="welcome-box">
                <h1>SimRail CZ1</h1>
                <div class="search-main">
                    <input type="text" id="station-search" placeholder="Zadejte název stanice (např. Koluszki)...">
                </div>
                <div id="stations-grid" class="grid-container"></div>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="main-header">
            <button id="back-btn" class="glass-btn">← ZPĚT</button>
            <div id="header-center">
                <h2 id="st-name">NÁZEV STANICE</h2>
                <input type="text" id="global-search" placeholder="Hledat spoj v této stanici...">
            </div>
            <div class="header-tools">
                <button id="view-toggle" class="glass-btn">TABULE</button>
                <button id="announcement-btn" class="glass-btn">HLÁŠENÍ</button>
            </div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="station-view">
            <div id="table-header">
                <div>Čas</div><div>Spoj</div><div>Odkud</div><div>Kam / Cíl</div><div>Nást./Kol.</div><div>Zpoždění</div><div>Stav</div>
            </div>
            <div id="departures-body"></div>
        </div>
    </div>

    <div id="board-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal('board-modal')">&times;</span>
            <div id="modal-board-container"></div>
        </div>
    </div>

    <div id="announcement-modal" class="modal hidden">
        <div class="modal-content ann-modal">
            <span class="close" onclick="closeModal('announcement-modal')">&times;</span>
            <h2 style="color: var(--accent-green);">STANIČNÍ ROZHLAS</h2>
            <div class="ann-controls">
                <button id="auto-ann-toggle" class="dispatch-btn">AUTOMATICKÉ HLÁŠENÍ: VYPNUTO</button>
            </div>
            <div class="ann-columns">
                <div class="ann-col">
                    <h3>PŘÍJEZDY (Blížící se)</h3>
                    <div id="arrivals-queue"></div>
                </div>
                <div class="ann-col">
                    <h3>ODJEZDY (Ve stanici)</h3>
                    <div id="departures-queue"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
