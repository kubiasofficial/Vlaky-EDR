<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SimRail Dispečer 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="home-screen">
        <div class="welcome-box">
            <h1>SimRail CZ1</h1>
            <p>Informační systém pro dispečery</p>
            <button id="enter-dispatch" class="dispatch-btn">VSTOUPIT DO DISPEČERSKÉHO REŽIMU</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="main-header">
            <button id="back-btn" class="glass-btn hidden">← ZPĚT</button>
            <div class="search-container">
                <input type="text" id="global-search" placeholder="Hledat stanici nebo vlak...">
                <button id="view-toggle" class="glass-btn hidden">TABULE</button>
            </div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="stations-grid" class="grid-container"></div>

        <div id="station-view" class="hidden">
            <h2 id="st-name" style="text-align: center; color: var(--neon-cyan); letter-spacing: 2px; text-transform: uppercase;"></h2>
            <div id="table-header" class="table-header-sticky">
                <div>Čas</div>
                <div>Spoj</div>
                <div>Odkud</div>
                <div>Kam / Cíl</div>
                <div>Nást./Kol.</div>
                <div>Zpoždění</div>
                <div>Stav</div>
            </div>
            <div id="departures-body"></div>
        </div>
    </div>

    <div id="board-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <div id="modal-board-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
