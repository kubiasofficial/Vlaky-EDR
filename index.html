<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimRail Live Board | Dispečerský režim</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-section">
            <div class="live-dot"></div>
            <h1>SIMRAIL <span class="cyan">CZ1</span></h1>
        </div>
        <div id="clock">--:--:--</div>
    </header>

    <main class="container">
        <button id="back-btn" class="hidden glass-btn">← ZPĚT NA VÝBĚR STANIC</button>

        <div id="stations-grid" class="grid-container">
            </div>

        <div id="station-view" class="hidden glass-panel">
            <h2 id="st-name">NÁZEV STANICE</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Čas</th>
                            <th>Vlak</th>
                            <th>Cíl</th>
                            <th>Perón</th>
                            <th>Kolej</th>
                            <th>Zpoždění</th>
                            <th>Stav</th>
                        </tr>
                    </thead>
                    <tbody id="departures-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
