<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimRail Live Board | Dispečer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="home-screen" class="full-screen">
        <div class="glass-panel central-hero animate-fade-up">
            <div class="flag-stripe"></div>
            <h1>SimRail <span class="cyan">CZ1</span></h1>
            <p>Informační systém pro dispečery</p>
            <button id="enter-dispatch" class="dispatch-btn">VSTOUPIT DO DISPEČERSKÉHO REŽIMU</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div class="header-left">
                <button id="back-btn" class="hidden glass-btn">← ZPĚT</button>
                <div id="brand-info">
                    <div class="live-dot"></div>
                    <span class="brand-text">SIMRAIL <span class="cyan">CZ1</span></span>
                </div>
            </div>
            <div class="header-center">
                <h2 id="st-name" class="hidden">VYBERTE STANICI</h2>
                <div class="search-wrapper" id="search-area">
                    <input type="text" id="global-search" placeholder="Hledat stanici nebo vlak...">
                </div>
            </div>
            <div class="header-right">
                <div id="clock">--:--:--</div>
            </div>
        </header>

        <main class="container">
            <div id="stations-grid" class="grid-container"></div>
            <div id="station-view" class="hidden animate-fade-in">
                <div class="table-wrapper glass-panel">
                    <table>
                        <thead>
                            <tr>
                                <th>Příjezd / Odjezd</th>
                                <th>Spoj</th>
                                <th>Odkud</th>
                                <th>Kam</th>
                                <th>Nást. / Kol.</th>
                                <th>Zpoždění</th>
                                <th>Stav</th>
                            </tr>
                        </thead>
                        <tbody id="departures-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
