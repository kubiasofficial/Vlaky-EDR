<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimRail Live Board | CZ1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="home-screen" class="full-screen">
        <div class="glass-panel central-hero">
            <h1>SimRail <span class="cyan">CZ1</span></h1>
            <p>Informační systém pro dispečery</p>
            <button id="enter-dispatch" class="dispatch-btn">VSTOUPIT DO DISPEČERSKÉHO REŽIMU</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="main-header">
            <div class="header-left">
                <button id="back-btn" class="hidden glass-btn">← ZPĚT</button>
            </div>
            <div class="header-center">
                <h2 id="st-name">VYBERTE STANICI</h2>
                <input type="text" id="global-search" placeholder="Hledat stanici nebo vlak...">
            </div>
            <div class="header-right">
                <div id="clock">--:--:--</div>
            </div>
        </header>

        <main class="container">
            <div id="stations-grid" class="grid-container"></div>
            
            <div id="station-view" class="hidden">
                <div class="table-header-sticky">
                    <div class="th-item">Příjezd / Odjezd</div>
                    <div class="th-item">Spoj</div>
                    <div class="th-item">Odkud</div>
                    <div class="th-item">Kam (Cíl)</div>
                    <div class="th-item">Nást. / Kol.</div>
                    <div class="th-item">Zpoždění</div>
                    <div class="th-item">Stav</div>
                </div>
                <div id="departures-body"></div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
